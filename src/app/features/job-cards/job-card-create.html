<div class="p-6 max-w-4xl mx-auto space-y-6">
  <!-- Header -->
  <div class="flex items-center gap-4">
    <button class="btn btn-ghost btn-sm" (click)="cancel()">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Back
    </button>
    <div>
      <h1 class="text-xl font-bold text-slate-800">New Job Card</h1>
      <p class="text-sm text-slate-500 mt-0.5">Create a new service job card</p>
    </div>
  </div>

  @if (error()) {
    <div class="bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-3 text-sm">{{ error() }}</div>
  }

  <form (ngSubmit)="onSubmit()" #createForm="ngForm" class="space-y-6">
    <!-- Section 1: Customer -->
    <div class="card p-6 space-y-4">
      <h2 class="text-sm font-bold text-slate-700 flex items-center gap-2">
        <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold flex items-center justify-center">1</span>
        Customer Information
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="form-label">Phone <span class="text-red-500">*</span></label>
          <input type="tel" name="custPhone" [(ngModel)]="form.customer.phone" required placeholder="9876543210" class="form-input"/>
        </div>
        <div>
          <label class="form-label">Full Name <span class="text-red-500">*</span></label>
          <input type="text" name="custName" [(ngModel)]="form.customer.name" required placeholder="Customer name" class="form-input"/>
        </div>
        <div>
          <label class="form-label">Email</label>
          <input type="email" name="custEmail" [(ngModel)]="form.customer.email" placeholder="customer@email.com" class="form-input"/>
        </div>
        <div>
          <label class="form-label">Address</label>
          <input type="text" name="custAddress" [(ngModel)]="form.customer.address" placeholder="Full address" class="form-input"/>
        </div>
      </div>
    </div>

    <!-- Section 2: Vehicle -->
    <div class="card p-6 space-y-4">
      <h2 class="text-sm font-bold text-slate-700 flex items-center gap-2">
        <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold flex items-center justify-center">2</span>
        Vehicle Information
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div>
          <label class="form-label">Registration Number <span class="text-red-500">*</span></label>
          <input type="text" name="regNumber" [(ngModel)]="form.vehicle.regNumber" required placeholder="MH12AB1234" class="form-input uppercase"/>
        </div>
        <div>
          <label class="form-label">Make</label>
          <input type="text" name="make" [(ngModel)]="form.vehicle.make" placeholder="e.g. Maruti Suzuki" class="form-input"/>
        </div>
        <div>
          <label class="form-label">Model</label>
          <input type="text" name="model" [(ngModel)]="form.vehicle.model" placeholder="e.g. Swift" class="form-input"/>
        </div>
        <div>
          <label class="form-label">Variant</label>
          <input type="text" name="variant" [(ngModel)]="form.vehicle.variant" placeholder="e.g. ZXi" class="form-input"/>
        </div>
        <div>
          <label class="form-label">Year</label>
          <input type="number" name="year" [(ngModel)]="form.vehicle.year" placeholder="2020" min="1990" max="2099" class="form-input"/>
        </div>
        <div>
          <label class="form-label">Fuel Type</label>
          <select name="fuelType" [(ngModel)]="form.vehicle.fuelType" class="form-input">
            <option value="">— Select —</option>
            @for (ft of fuelTypes; track ft) {
              <option [value]="ft">{{ ft }}</option>
            }
          </select>
        </div>
        <div>
          <label class="form-label">Color</label>
          <input type="text" name="color" [(ngModel)]="form.vehicle.color" placeholder="e.g. White" class="form-input"/>
        </div>
        <div>
          <label class="form-label">Chassis No.</label>
          <input type="text" name="chassisNo" [(ngModel)]="form.vehicle.chassisNo" placeholder="Chassis number" class="form-input"/>
        </div>
      </div>
    </div>

    <!-- Section 3: Service -->
    <div class="card p-6 space-y-4">
      <h2 class="text-sm font-bold text-slate-700 flex items-center gap-2">
        <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-700 text-xs font-bold flex items-center justify-center">3</span>
        Service Details
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div>
          <label class="form-label">Service Type</label>
          <select name="serviceType" [(ngModel)]="form.serviceType" class="form-input">
            @for (st of serviceTypes; track st) {
              <option [value]="st">{{ labelOf(st) }}</option>
            }
          </select>
        </div>
        <div>
          <label class="form-label">KM In</label>
          <input type="number" name="kmIn" [(ngModel)]="form.kmIn" placeholder="e.g. 15000" min="0" class="form-input"/>
        </div>
        <div>
          <label class="form-label">Advisor Name</label>
          <input type="text" name="advisorName" [(ngModel)]="form.advisorName" placeholder="Service advisor" class="form-input"/>
        </div>
        <div>
          <label class="form-label">Expected Delivery</label>
          <input type="date" name="expectedDelivery" [(ngModel)]="form.expectedDelivery" class="form-input"/>
        </div>
        <div class="md:col-span-2">
          <label class="form-label">Customer Complaint</label>
          <textarea
            name="customerComplaint"
            [(ngModel)]="form.customerComplaint"
            rows="3"
            placeholder="Describe the issue or service requested…"
            class="form-input resize-none"
          ></textarea>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-end gap-3">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading()">
        @if (loading()) {
          <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          Creating…
        } @else {
          Create Job Card
        }
      </button>
    </div>
  </form>
</div>
